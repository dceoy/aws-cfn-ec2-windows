---
AWSTemplateFormatVersion: 2010-09-09
Description: >-
  CloudFormation template to launch a Windows Server EC2 instance for
  MetaTrader 5.  The instance is accessible via RDP (TCP 3389) from a
  configurable CIDR block and installs MetaTrader 5 automatically on
  first boot using a PowerShell UserData script.

Parameters:
  ProjectName:
    Description: Project name used for resource tagging
    Type: String
    Default: mt5

  VpcId:
    Description: VPC ID where the instance will be launched
    Type: AWS::EC2::VPC::Id

  SubnetId:
    Description: Subnet ID for the instance
    Type: AWS::EC2::Subnet::Id

  InstanceType:
    Description: EC2 instance type
    Type: String
    Default: t3.large
    AllowedValues:
      - t3.medium
      - t3.large
      - t3.xlarge
      - t3.2xlarge
      - m5.large
      - m5.xlarge
      - m5.2xlarge
      - m6i.large
      - m6i.xlarge
      - m6i.2xlarge
      - c5.large
      - c5.xlarge
      - c5.2xlarge
      - c6i.large
      - c6i.xlarge
      - c6i.2xlarge

  WindowsAmiId:
    Description: >-
      SSM parameter path for the Windows Server AMI ID.  Defaults to
      the latest Windows Server 2022 English Full Base AMI.
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-windows-latest/Windows_Server-2022-English-Full-Base

  KeyPairName:
    Description: >-
      Name of an existing EC2 key pair for decrypting the Windows
      administrator password.  Leave empty to skip key pair assignment.
    Type: String
    Default: ""

  RdpCidr:
    Description: >-
      CIDR block allowed to connect via RDP.  Must be restricted to your
      own IP address (e.g. 203.0.113.1/32).  No default is provided
      intentionally — supply a specific CIDR to limit exposure.
    Type: String
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Must be a valid CIDR block (e.g. 203.0.113.1/32).

  VolumeSize:
    Description: Root EBS volume size in GiB
    Type: Number
    Default: 100
    MinValue: 50
    MaxValue: 1000

  VolumeType:
    Description: Root EBS volume type
    Type: String
    Default: gp3
    AllowedValues:
      - gp3
      - gp2
      - io1
      - io2

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_25
            comment: >-
              RDP access is restricted via the RdpCidr parameter, which has
              no insecure default.  Static analysis cannot evaluate runtime
              parameter values.
    Properties:
      GroupDescription: !Sub "${ProjectName} - Allow RDP access"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3389
          ToPort: 3389
          CidrIp: !Ref RdpCidr
          Description: RDP access
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-sg"
        - Key: Project
          Value: !Ref ProjectName

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-ec2-role"
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ProjectName}-ec2-profile"
      Roles:
        - !Ref InstanceRole

  Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref WindowsAmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref SubnetId
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: !Ref VolumeType
            Encrypted: true
      UserData:
        Fn::Base64: !Sub |
          <powershell>
          # --- MetaTrader 5 Installation Script ---

          $ErrorActionPreference = "Continue"
          $mt5Installer = "$env:TEMP\mt5setup.exe"

          # Download the MetaTrader 5 installer
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" `
            -OutFile $mt5Installer -UseBasicParsing

          # Install MetaTrader 5 silently
          Start-Process -FilePath $mt5Installer -ArgumentList "/auto" -Wait

          # Clean up the installer
          Remove-Item -Path $mt5Installer -Force -ErrorAction SilentlyContinue

          # Signal cfn-init completion
          cfn-signal.exe --exit-code $LASTEXITCODE --stack ${AWS::StackName} --resource Instance --region ${AWS::Region}
          </powershell>
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-windows"
        - Key: Project
          Value: !Ref ProjectName
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M

Outputs:
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref Instance

  PrivateIp:
    Description: Private IP address of the instance
    Value: !GetAtt Instance.PrivateIp

  PublicIp:
    Description: >-
      Public IP address of the instance (empty if the subnet does not
      assign public IPs)
    Value: !GetAtt Instance.PublicIp

  SecurityGroupId:
    Description: Security group ID
    Value: !Ref SecurityGroup
